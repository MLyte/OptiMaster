name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows portable zip
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pyinstaller

      - name: Run tests
        shell: pwsh
        run: |
          $env:TEMP = Join-Path $env:GITHUB_WORKSPACE ".tmp-ci"
          $env:TMP = $env:TEMP
          New-Item -ItemType Directory -Force -Path $env:TEMP | Out-Null
          python -m pytest -q --basetemp .pytest-run-ci -p no:cacheprovider

      - name: Build OptiMaster GUI
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --name OptiMaster --icon src/optimaster/assets/optimaster_icon.ico --collect-all PySide6 src/optimaster/gui.py

      - name: Package portable archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -eq "") {
            $tag = "manual-${{ github.run_number }}"
          }
          $artifactDir = "release_artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $zipPath = Join-Path $artifactDir "OptiMaster-$tag-windows-x64.zip"
          Compress-Archive -Path "dist/OptiMaster/*" -DestinationPath $zipPath -Force
          $hash = Get-FileHash -Algorithm SHA256 $zipPath
          "$($hash.Hash)  $(Split-Path $zipPath -Leaf)" | Out-File -Encoding ascii (Join-Path $artifactDir "SHA256SUMS.txt")

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optimaster-windows-portable
          path: release_artifacts/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_artifacts/*
          generate_release_notes: true
          prerelease: true
