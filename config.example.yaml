ffmpeg_binary: ffmpeg
output_format: wav
default_mode: balanced
scoring:
  target_lufs_min: -11.0
  target_lufs_max: -9.0
  ideal_true_peak_max: -1.0
  hard_true_peak_max: -0.5
  min_lra: 5.0
  preferred_lra_min: 6.0
  max_lufs_delta_from_source: 2.0
presets:
  enabled:
    - do_almost_nothing
    - transparent_trim
    - safe_limit
    - sweet_spot
    - gentle_glue
